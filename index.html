<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Ewidencja czasu pracy</title>
<style>
:root {
  --bg:#f5f7fb; --panel:#fff; --line:#d7ddea;
  --text:#1f2937; --muted:#6b7280;
  --brand:#2f6fed; --brand-2:#1d4ed8;
  --danger:#b91c1c; --ok:#166534;
}
body {margin:0;font-family:Arial;background:var(--bg);}
.wrap {max-width:1400px;margin:auto;padding:20px;}
.panel {background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;}
button {padding:10px;border-radius:10px;border:0;cursor:pointer;font-weight:bold;}
.primary{background:#2f6fed;color:#fff;}
.secondary{background:#eef2ff;}
.danger{background:#fee2e2;color:#b91c1c;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:6px;font-size:13px;}
</style>
</head>
<body>

<div class="wrap">
<h1>Ewidencja czasu pracy</h1>

<div>
<input id="fullName" placeholder="Imię i nazwisko">

<select id="monthSelect"></select>
<input id="yearInput" type="number" style="width:80px">

<button id="printBtn">PDF</button>
</div>

<hr>

<h3>CRP</h3>
<input id="crpCode" placeholder="Kod">
<input id="crpLabel" placeholder="Opis">
<button id="addCrpBtn">Dodaj</button>
<button id="deleteCrpBtn" class="danger">Usuń CRP</button>

<div id="crpChips"></div>

<hr>

<h3>Wpis</h3>
<select id="day"></select>
<select id="crpSelect"></select>
<input id="startTime" type="time">
<input id="endTime" type="time">
<input id="description">
<button id="saveBtn">Zapisz</button>

<hr>

<table>
<thead>
<tr>
<th>Dzień</th><th>CRP</th><th>Start</th><th>Koniec</th><th>h</th>
</tr>
</thead>
<tbody id="entriesBody"></tbody>
</table>

</div>

<div id="printSheet"></div>

<script>
const STORAGE_PREFIX='ewidencja-v4';

function getKey(){
  return STORAGE_PREFIX+"-"+state.year+"-"+state.month;
}

function load(){
  return JSON.parse(localStorage.getItem(getKey())||"null");
}
function save(){
  localStorage.setItem(getKey(),JSON.stringify(state));
}

const now=new Date();
let state=load()||{
  month:now.getMonth(),
  year:now.getFullYear(),
  crps:[],
  entries:[]
};

const el=id=>document.getElementById(id);

function renderMonth(){
  el('monthSelect').innerHTML='';
  for(let i=0;i<12;i++){
    let o=document.createElement('option');
    o.value=i;o.textContent=i+1;
    el('monthSelect').appendChild(o);
  }
  el('monthSelect').value=state.month;
  el('yearInput').value=state.year;
}

el('monthSelect').onchange=()=>{
  state.month=Number(el('monthSelect').value);
  state=load()||{...state,entries:[]};
  renderAll();
};
el('yearInput').oninput=()=>{
  state.year=Number(el('yearInput').value);
  state=load()||{...state,entries:[]};
  renderAll();
};

function renderDays(){
  el('day').innerHTML='';
  let d=new Date(state.year,state.month+1,0).getDate();
  for(let i=1;i<=d;i++){
    let o=document.createElement('option');
    o.value=i;o.textContent=i;
    el('day').appendChild(o);
  }
}

function crpName(c){return c.label?c.code+"_"+c.label:c.code;}

function renderCrps(){
  el('crpSelect').innerHTML='';
  el('crpChips').innerHTML='';
  state.crps.forEach(c=>{
    let o=document.createElement('option');
    o.value=c.id;o.textContent=crpName(c);
    el('crpSelect').appendChild(o);

    let chip=document.createElement('div');
    chip.textContent=crpName(c);
    chip.style.cursor='pointer';
    chip.onclick=()=>{
      el('crpCode').value=c.code;
      el('crpLabel').value=c.label||'';
    };
    el('crpChips').appendChild(chip);
  });
}

function hours(s,e){
  let[a,b]=s.split(':').map(Number);
  let[c,d]=e.split(':').map(Number);
  return ((c*60+d)-(a*60+b))/60;
}

function renderEntries(){
  el('entriesBody').innerHTML='';
  state.entries.forEach(e=>{
    let tr=document.createElement('tr');
    let c=state.crps.find(x=>x.id===e.crpId);
    tr.innerHTML=`
    <td>${e.day}</td>
    <td>${c?c.code:''}</td>
    <td>${e.start}</td>
    <td>${e.end}</td>
    <td>${e.h.toFixed(2)}</td>`;
    el('entriesBody').appendChild(tr);
  });
}

el('saveBtn').onclick=()=>{
  state.entries.push({
    id:crypto.randomUUID(),
    day:Number(el('day').value),
    crpId:el('crpSelect').value,
    start:el('startTime').value,
    end:el('endTime').value,
    h:hours(el('startTime').value,el('endTime').value)
  });
  save();renderEntries();
};

el('addCrpBtn').onclick=()=>{
  state.crps.push({
    id:crypto.randomUUID(),
    code:el('crpCode').value,
    label:el('crpLabel').value
  });
  save();renderCrps();
};

el('deleteCrpBtn').onclick=()=>{
  let code=el('crpCode').value;
  let c=state.crps.find(x=>x.code===code);
  if(!c)return alert("Brak CRP");

  let used=state.entries.some(e=>e.crpId===c.id);
  if(used)return alert("Używany!");

  state.crps=state.crps.filter(x=>x.id!==c.id);
  save();renderCrps();
};

function renderAll(){
  renderMonth();
  renderDays();
  renderCrps();
  renderEntries();
}

renderAll();
</script>

</body>
</html>
