<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ewidencja czasu pracy</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Ewidencja czasu pracy</h1>
        <div class="muted" id="monthLabel"></div>
      </div>

      <div class="inline">
        <div>
          <label>Imię i nazwisko</label>
          <input id="fullName" />
        </div>

        <button class="secondary mini" id="previewBtn">Podgląd A4</button>
        <button class="primary mini" id="printBtn">Drukuj / Zapisz PDF</button>
      </div>
    </div>

    <div class="summary">
      <div class="card"><div class="muted">Suma godzin miesiąca</div><div class="big" id="sumHours">0,0</div></div>
      <div class="card"><div class="muted">Liczba wpisów</div><div class="big" id="rowCount">0</div></div>
      <div class="card"><div class="muted">Aktywny timer</div><div class="big" id="timerState">brak</div></div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Nowy wpis / edycja</h2>

        <div class="form-row">
          <div>
            <label>Dzień miesiąca</label>
            <select id="day"></select>
          </div>
          <div>
            <label>Kod CRP</label>
            <select id="crpSelect"></select>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label>Godzina rozpoczęcia</label>
            <input id="startTime" type="time" />
          </div>
          <div>
            <label>Godzina zakończenia</label>
            <input id="endTime" type="time" />
          </div>
        </div>

        <div class="form-row single">
          <textarea id="description"></textarea>
        </div>

        <div class="btns">
          <button class="primary" id="saveBtn">Zapisz wpis</button>
          <button class="ghost" id="resetBtn">Wyczyść</button>
        </div>
      </div>

      <div class="panel">
        <h2>Wpisy</h2>
        <table>
          <tbody id="entriesBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="printSheet"></div>

  <script src="script.js"></script>
</body>
</html>
